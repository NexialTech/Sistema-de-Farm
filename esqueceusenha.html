<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperação de Senha</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>
<body class="forgot-page">

    <div class="left-section"></div>

    <div class="right-section">
        <div class="login-header">
            <p class="subtitle">Recuperação de conta</p>
            <h1>ESQUECI A SENHA</h1>
            <div class="underline"></div>
            <p class="description">Insira seu e-mail e o código da sua facção para receber um link de redefinição.</p>
        </div>

        <form id="form-recuperar" action="#" method="post" novalidate>
            
            <div class="input-group">
                <label for="email-recuperacao">E-mail cadastrado</label>
                <div class="input-wrapper">
                    <i class="fa-regular fa-envelope"></i>
                    <input 
                        type="email" 
                        id="email-recuperacao" 
                        name="email-recuperacao" 
                        placeholder="seu@email.com" 
                        autocomplete="email"
                        required
                    >
                </div>
                <div id="erro-email" class="erro" style="display: none; margin-top: 8px;">Por favor, insira um e-mail válido (com @).</div>
            </div>

            <div class="input-group">
                <label for="codigo-org">Código da facção</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-key"></i>
                    <input 
                        type="text" 
                        id="codigo-org" 
                        name="codigo-org" 
                        placeholder="Ex: A1B2C34 (4 números, 3 letras)" 
                        autocomplete="off"
                        required
                        pattern="^(?=(?:\D*\d){4})(?=(?:[^A-Za-z]*[A-Za-z]){3})[A-Za-z0-9]{7}$"
                        title="O código deve ter exatamente 7 caracteres, com 4 números e 3 letras."
                    >
                </div>
                <div id="erro-codigo" class="erro" style="display: none; margin-top: 8px;">O código deve ter 7 caracteres, com 4 números e 3 letras.</div>
            </div>

            <button type="submit" class="btn-login" style="margin-top: 10px;">RECUPERAR SENHA</button>
            <button type="button" class="btn-voltar-secundario" onclick="window.location.href='login.html'">VOLTAR PARA O LOGIN</button>
            
        </form>
    </div>

    <script src="recuperacao.js"></script>
</body>
</html>
