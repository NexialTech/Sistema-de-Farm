<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="left-section">
        <div class="top-header">
            <button class="btn-back" onclick="window.location.href='login.html'"><i class="fa-solid fa-chevron-left"></i></button>
            <div class="logo-placeholder"></div>
            <span class="system-name">NOME DO SISTEMA</span>
        </div>
    </div>

    <div class="right-section">
        <div class="login-header">
            <p class="subtitle">Crie sua conta</p>
            <h1>CADASTRO</h1>
            <div class="underline"></div>
            <p class="description">Preencha os dados abaixo para ingressar no sistema e gerenciar suas produções.</p>
        </div>

        <form id="form-cadastro" action="#" method="post">
            
            <div class="input-group">
                <label>Email</label>
                <div class="input-wrapper">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" id="email" name="email" placeholder="seu@email.com" autocomplete="email" required>
                </div>
            </div>

            <div class="input-group">
                <label>Senha</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="senha" name="senha" placeholder="Digite sua senha" autocomplete="new-password" required minlength="6">
                </div>
            </div>

            <div class="input-group">
                <label>Confirmar senha</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="confirmarSenha" name="confirmarSenha" placeholder="Confirme sua senha" autocomplete="new-password" required minlength="6">
                </div>
                <p id="mensagemErro" class="erro" aria-live="polite"></p>
            </div>

            <div class="input-group">
                <label>Código da facção</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-key"></i>
                    <input type="text" id="codigoFaccao" name="codigoFaccao" placeholder="Ex: abc1234" required pattern="(?=.{7}$)(?=(?:.*[A-Za-z]){3})(?=(?:.*\d){4})[A-Za-z0-9]+" maxlength="7">
                </div>
                <p id="mensagemCodigo" class="erro" aria-live="polite"></p>
            </div>

            <button type="submit" class="btn-login">CADASTRAR</button>
            <button type="button" class="btn-voltar-secundario" onclick="window.location.href='login.html'">VOLTAR PARA O LOGIN</button>
            
        </form>
    </div>

    <script src="cadastro.js"></script>
</body>
</html>
